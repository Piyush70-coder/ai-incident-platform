{% extends 'base.html' %}

{% block title %}Reset Password - Incident Management{% endblock %}

{% block content_guest %}
<div class="min-h-screen flex items-center justify-center bg-[#1a1d2e] px-4">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-white">Reset Password</h2>
            <p class="mt-2 text-sm text-gray-400">Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <form class="mt-8 space-y-6" method="post">
            {% csrf_token %}
            
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
                    <input id="email" name="email" type="email" required class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-700 placeholder-gray-500 text-gray-300 bg-[#22263a] focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Enter your email">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <a href="{% url 'login' %}" class="font-medium text-indigo-400 hover:text-indigo-300">
                        Back to Login
                    </a>
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
                    Send Reset Link
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
