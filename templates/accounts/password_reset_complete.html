{% extends 'base.html' %}

{% block title %}Password Reset Complete - Incident Management{% endblock %}

{% block content_guest %}
<div class="min-h-screen flex items-center justify-center bg-[#1a1d2e] px-4">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="mx-auto h-12 w-12 bg-green-500 rounded-lg flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-white">Password Reset Complete</h2>
            <p class="mt-2 text-sm text-gray-400">
                Your password has been set. You may go ahead and log in now.
            </p>
        </div>

        <div class="mt-8">
            <a href="{% url 'login' %}" class="w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
                Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
