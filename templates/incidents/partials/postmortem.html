<div class="card bg-gray-800 border border-gray-700 mt-6 animate-fade-in">
    <div class="flex justify-between items-start mb-4">
        <h3 class="font-bold text-xl text-indigo-400">AI Generated Post-Mortem</h3>
        <button onclick="this.closest('.card').remove()" class="text-gray-400 hover:text-white">&times;</button>
    </div>
    <div class="prose prose-invert max-w-none whitespace-pre-wrap text-gray-300">
        {{ report|safe }}
    </div>
    <div class="mt-4 pt-4 border-t border-gray-700 flex justify-end">
        <button onclick="navigator.clipboard.writeText(this.parentElement.previousElementSibling.innerText)" class="btn-secondary text-sm">
            Copy to Clipboard
        </button>
    </div>
</div>
